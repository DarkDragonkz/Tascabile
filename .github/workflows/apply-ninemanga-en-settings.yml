name: Apply NineManga IT EN Settings

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    name: Apply NineManga IT EN settings
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Apply NineManga IT EN settings
        run: node tools/apply-ninemanga-en-settings.mjs

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/NineManga/main.ts src/NineManga/pbconfig.ts
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Enable NineManga Italian English language setting"
            git push
          fi
