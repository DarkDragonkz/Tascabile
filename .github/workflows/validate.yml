name: Validate

on:
  push:
    branches:
      - main
      - "paperback-0-9-rebuild"
      - "feature/**"
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Run TypeScript compiler
        run: npm run tsc

      - name: Run lint check
        run: npm run lint:check

      - name: Run format check
        run: npm run format:check

# Trigger CI for Paperback 0.9 migration
