name: Fix NineManga IT EN Cleanup

on:
  push:
    branches:
      - main
    paths:
      - trigger-ninemanga-it-en-cleanup.txt

permissions:
  contents: write

jobs:
  fix:
    name: Remove unreachable ESP branch and cleanup temp workflows
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Patch NineManga source
        run: |
          node <<'NODE'
          const fs = require('node:fs');
          const filePath = 'src/NineManga/main.ts';
          let content = fs.readFileSync(filePath, 'utf8');

          const espBranch = `

  if (language === "esp") {
    return dedupeStrings([
      \`${'${baseUrl}'}/${'${cleanChapterId}'}.html\`,
      \`${'${baseUrl}'}/${'${readerChapterId}'}.html\`,
    ]);
  }
`;

          if (content.includes(espBranch)) {
            content = content.split(espBranch).join('\n');
          }

          content = content.replace(
            '  private getChapterReaderUrls(baseUrl: string, cleanChapterId: string): string[] {\n  const language = getSelectedLanguage();',
            '  private getChapterReaderUrls(baseUrl: string, cleanChapterId: string): string[] {\n    const language = getSelectedLanguage();',
          );

          content = content.replace(
            '    `${baseUrl}/${cleanChapterId}`,\n  ]);\n}\n',
            '    `${baseUrl}/${cleanChapterId}`,\n  ]);\n  }\n',
          );

          fs.writeFileSync(filePath, content);
          NODE

      - name: Remove temporary workflow files
        run: |
          rm -f .github/workflows/apply-ninemanga-en-settings.yml
          rm -f .github/workflows/auto-apply-ninemanga-en-settings.yml
          rm -f .github/workflows/fix-ninemanga-it-en-cleanup.yml
          rm -f trigger-ninemanga-en-settings.txt
          rm -f trigger-ninemanga-it-en-cleanup.txt

      - name: Commit and push cleanup
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Fix NineManga IT EN settings cleanup"
            git push
          fi
