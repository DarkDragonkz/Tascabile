name: Fix NineManga Debug Regex

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix:
    name: Fix debug regex escaping
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Fix regex escaping
        run: node tools/fix-ninemanga-debug-regex.mjs

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/NineManga/main.ts
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Fix NineManga debug regex lint errors"
            git push
          fi
