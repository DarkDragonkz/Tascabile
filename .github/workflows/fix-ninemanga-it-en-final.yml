name: Fix NineManga IT EN Final

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  fix:
    name: Fix NineManga IT EN source
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Patch NineManga source
        run: |
          python3 <<'PY'
          from pathlib import Path

          path = Path('src/NineManga/main.ts')
          content = path.read_text()

          old = '''

  if (language === "esp") {
    return dedupeStrings([
      `${baseUrl}/${cleanChapterId}.html`,
      `${baseUrl}/${readerChapterId}.html`,
    ]);
  }
'''
          content = content.replace(old, '\n')
          content = content.replace(
              '  private getChapterReaderUrls(baseUrl: string, cleanChapterId: string): string[] {\n  const language = getSelectedLanguage();',
              '  private getChapterReaderUrls(baseUrl: string, cleanChapterId: string): string[] {\n    const language = getSelectedLanguage();',
          )
          content = content.replace(
              '    `${baseUrl}/${cleanChapterId}`,\n  ]);\n}\n',
              '    `${baseUrl}/${cleanChapterId}`,\n  ]);\n  }\n',
          )
          path.write_text(content)
          PY

      - name: Remove temporary workflow files
        run: |
          rm -f .github/workflows/apply-ninemanga-en-settings.yml
          rm -f .github/workflows/auto-apply-ninemanga-en-settings.yml
          rm -f .github/workflows/fix-ninemanga-it-en-cleanup.yml
          rm -f .github/workflows/fix-ninemanga-it-en-now.yml
          rm -f .github/workflows/fix-ninemanga-it-en-final.yml
          rm -f trigger-ninemanga-en-settings.txt
          rm -f trigger-ninemanga-it-en-cleanup.txt

      - name: Commit and push fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Fix NineManga IT EN build"
            git push
          fi
