name: Publish Paperback Bundle

on:
  push:
    branches:
      - main
      - "0.8"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript typecheck
        run: npm run typecheck

      - name: Run tests
        run: npm test

      - name: Get branch name
        id: branch
        shell: bash
        run: |
          BRANCH_NAME="${GITHUB_REF_NAME}"
          echo "name=${BRANCH_NAME}" >> "$GITHUB_OUTPUT"

      - name: Prepare bundle directory
        shell: bash
        run: |
          mkdir -p bundles/${{ steps.branch.outputs.name }}

      - name: Build Paperback bundle
        run: npm run bundle -- --folder=${{ steps.branch.outputs.name }}

      - name: Prepare GitHub Pages files
        shell: bash
        run: |
          touch bundles/.nojekyll

          if [ -f "index.html" ]; then
            cp index.html bundles/index.html
          fi

      - name: Publish to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./bundles
          force_orphan: true
          full_commit_message: "Publish Paperback bundle for ${{ steps.branch.outputs.name }}"