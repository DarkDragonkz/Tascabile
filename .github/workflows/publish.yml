name: Publish Paperback Bundle

on:
  push:
    branches:
      - main
      - "0.8"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PAPERBACK_FOLDER: "0.8"
  PAPERBACK_BASE_URL: "https://darkdragonkz.github.io/Tascabile/0.8"

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript typecheck
        run: npm run typecheck

      - name: Run tests
        run: npm test

      - name: Prepare bundle directory
        shell: bash
        run: |
          mkdir -p bundles/${PAPERBACK_FOLDER}

      - name: Build Paperback bundle
        run: npm run bundle -- --folder=${PAPERBACK_FOLDER}

      - name: Prepare GitHub Pages files
        shell: bash
        run: |
          touch bundles/.nojekyll

          if [ -f "index.html" ]; then
            cp index.html bundles/index.html
          fi

          if [ -f "bundles/${PAPERBACK_FOLDER}/index.html" ]; then
            CORRECT_URL="${PAPERBACK_BASE_URL}"
            CORRECT_URL_ENCODED=$(python3 -c "import urllib.parse, os; print(urllib.parse.quote(os.environ['PAPERBACK_BASE_URL'], safe=''))")

            sed -i "s#displayName=undefined#displayName=Tascabile#g" "bundles/${PAPERBACK_FOLDER}/index.html"

            sed -i "s#https://darkdragonkz.github.io/tascabile/${PAPERBACK_FOLDER}#${CORRECT_URL}#g" "bundles/${PAPERBACK_FOLDER}/index.html"
            sed -i "s#https%3A%2F%2Fdarkdragonkz.github.io%2Ftascabile%2F${PAPERBACK_FOLDER}#${CORRECT_URL_ENCODED}#g" "bundles/${PAPERBACK_FOLDER}/index.html"
          fi

      - name: Publish to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./bundles
          force_orphan: true
          full_commit_message: "Publish Paperback bundle"