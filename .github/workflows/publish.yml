name: Publish Paperback Bundle

on:
  push:
    branches:
      - main
      - "0.8"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript typecheck
        run: npm run typecheck

      - name: Run tests
        run: npm test

      - name: Get branch name
        id: branch
        shell: bash
        run: |
          BRANCH_NAME="${GITHUB_REF_NAME}"
          echo "name=${BRANCH_NAME}" >> "$GITHUB_OUTPUT"

      - name: Prepare bundle directory
        shell: bash
        run: |
          mkdir -p bundles/${{ steps.branch.outputs.name }}

      - name: Build Paperback bundle
        run: npm run bundle -- --folder=${{ steps.branch.outputs.name }}

      - name: Prepare GitHub Pages files
        shell: bash
        run: |
          touch bundles/.nojekyll

          if [ -f "index.html" ]; then
            cp index.html bundles/index.html
          fi

      - name: Publish to gh-pages
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git fetch origin gh-pages || true

          if git show-ref --verify --quiet refs/remotes/origin/gh-pages; then
            git worktree add gh-pages-worktree origin/gh-pages
          else
            git worktree add --detach gh-pages-worktree
            cd gh-pages-worktree
            git checkout --orphan gh-pages
            git rm -rf . || true
            cd ..
          fi

          rsync -av --delete bundles/ gh-pages-worktree/

          cd gh-pages-worktree
          git add .

          if git diff --cached --quiet; then
            echo "No changes to publish."
            exit 0
          fi

          git commit -m "Publish Paperback bundle for ${{ steps.branch.outputs.name }}"
          git push origin HEAD:gh-pages