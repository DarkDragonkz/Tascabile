name: Patch NineManga CF

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Patch NineManga cf_clearance
        run: |
          cat > /tmp/patch.py.b64 <<'EOF'

EOF
          python3 - <<'PY'
import base64
from pathlib import Path
code = base64.b64decode(Path('/tmp/patch.py.b64').read_text()).decode()
exec(code)
PY
      - name: Commit patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/NineManga/main.ts src/NineManga/pbconfig.ts
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "Add NineManga English cf_clearance setting"
            git push
          fi
