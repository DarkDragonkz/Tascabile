name: Bundle Check

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - "paperback-0-9-rebuild"
      - "feature/**"
  pull_request:
    branches:
      - main

jobs:
  bundle-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript compiler
        run: npm run tsc

      - name: Build extensions
        run: npm run build

      - name: Inspect build output
        shell: bash
        run: |
          echo "Generated files:"
          find dist -maxdepth 4 -type f | sort || true

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: paperback-0.9-build
          path: dist
