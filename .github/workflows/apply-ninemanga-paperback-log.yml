name: Apply NineManga Paperback Log Patch

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    name: Apply debug patch
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout debug branch
        uses: actions/checkout@v4
        with:
          ref: debug/ninemanga-paperback-log
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Apply diagnostics patch
        run: node tools/apply-ninemanga-paperback-log.mjs

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/NineManga/main.ts
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Add Paperback runtime diagnostics for NineManga EN reader"
            git push origin HEAD:debug/ninemanga-paperback-log
          fi
