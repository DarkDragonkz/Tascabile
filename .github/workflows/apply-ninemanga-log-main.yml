name: Apply NineManga Log Main

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: node tools/apply-ninemanga-paperback-log.mjs
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/NineManga/main.ts
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "Apply NineManga runtime logs on main"
            git push
          fi
