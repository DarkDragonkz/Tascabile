name: Patch NineManga Main

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Patch main.ts
        run: |
          python3 <<'PY'
          from pathlib import Path
          path = Path('src/NineManga/main.ts')
          text = path.read_text()
          start = text.find('\n\n  if (language === "esp") {')
          end = text.find('\n\n  return dedupeStrings([', start)
          if start != -1 and end != -1:
              text = text[:start] + text[end:]
          text = text.replace(
              '  private getChapterReaderUrls(baseUrl: string, cleanChapterId: string): string[] {\n  const language = getSelectedLanguage();',
              '  private getChapterReaderUrls(baseUrl: string, cleanChapterId: string): string[] {\n    const language = getSelectedLanguage();',
          )
          text = text.replace(
              '    `${baseUrl}/${cleanChapterId}`,\n  ]);\n}\n',
              '    `${baseUrl}/${cleanChapterId}`,\n  ]);\n  }\n',
          )
          path.write_text(text)
          PY
      - name: Commit patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/NineManga/main.ts
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "Remove unreachable NineManga ESP branch"
            git push
          fi
